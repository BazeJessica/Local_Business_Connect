 
 <div class="container">
    <div class="header">
        <h2 class="header-title">What Our Community Says</h2>
        <p class="header-subtitle">Real stories from real users</p>
    </div>
    <div class="testimonials">
    <div *ngFor="let testimony of testimonials" class="testimonial-card">
      <div class="avatar">
        <img [src]="testimony.image" [alt]="testimony.name" />
      </div>
      <h2 class="name">{{ testimony.name }}</h2>
      <p class="role">{{ testimony.role }}</p>
  
      <div class="stars">
        <ng-container *ngFor="let star of getStars(testimony.rating)">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#F19E39">
            <path d="m354-287 126-76 126 77-33-144 111-96-146-13-58-136-58 135-146 13 111 97-33 143ZM233-120l65-281L80-590l288-25 112-265 112 265 288 25-218 189 65 281-247-149-247 149Zm247-350Z"/>
          </svg>
        </ng-container>
      </div>
  
      <p class="quote">"{{ testimony.quote }}"</p>
    </div>
  </div>
  
 </div>
