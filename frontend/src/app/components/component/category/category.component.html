<div class="category-card-container">
  @for (category of filteredCategories; track $index) {
  <div class="card">
    <img
      [src]="category.img"
      alt="{{ category.name }}"
      class="category-image"
    />
    <div class="content">
      <h2 class="content-title">{{ category.name }}</h2>
      <p class="content-description">
        {{ category.description }}
      </p>
      <a [href]="category.url"><button>Explore</button></a>
    </div>
  </div>
  }
</div>
