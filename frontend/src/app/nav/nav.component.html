<div class="nav-container">
  <a routerLink="/">
    <img src="/assets/logo.png" alt="Company Logo" class="logo" />
  </a>

  <!-- Hamburger menu -->
  <div class="menu-toggle" (click)="toggleMenu()">&#9776;</div>

  <nav class="nav">
    <ul class="nav-links" [class.open]="menuOpen">
      <li><a routerLink="/" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/about" (click)="closeMenu()">About</a></li>
      <li><a routerLink="/contact" (click)="closeMenu()">Contact</a></li>
      <li><a routerLink="/businessServices">Services</a></li>
      <li><a routerLink="/for-business">For Business</a></li>

      <!-- SignUp/Login for mobile menu -->
      <li class="mobile-signup" *ngIf="!authenticated" (click)="closeMenu()">
        <a routerLink="/signup">SignUp/Login</a>
      </li>
    </ul>
  </nav>

  <!-- SignUp/Login for desktop -->
  @if(!authenticated){
  <ul class="nav-right">
    <li><a routerLink="/signup">SignUp/Login</a></li>
  </ul>
  }
</div>
